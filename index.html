<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="calculator" aria-label="シンプル電卓">
      <h1>Simple Calculator</h1>
      <output id="display" class="display" aria-live="polite">0</output>
      <div class="buttons" role="group" aria-label="電卓ボタン">
        <button type="button" class="clear" data-action="clear">C</button>
        <button type="button" class="operator" data-operator="power" aria-label="べき乗">xʸ</button>
        <button type="button" data-number="7">7</button>
        <button type="button" data-number="8">8</button>
        <button type="button" data-number="9">9</button>
        <button type="button" class="operator" data-operator="divide">÷</button>
        <button type="button" data-number="4">4</button>
        <button type="button" data-number="5">5</button>
        <button type="button" data-number="6">6</button>
        <button type="button" class="operator" data-operator="multiply">×</button>
        <button type="button" data-number="1">1</button>
        <button type="button" data-number="2">2</button>
        <button type="button" data-number="3">3</button>
        <button type="button" class="operator" data-operator="subtract">−</button>
        <button type="button" class="zero" data-number="0">0</button>
        <button type="button" class="equals" data-action="equals">=</button>
        <button type="button" class="operator" data-operator="add">+</button>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
